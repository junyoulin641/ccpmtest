[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
addopts =
    --verbose
    --cov=core
    --cov=ui
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    -p no:warnings
